<img [src]="product.imageUrl" width="250" />
<h3>{{ product.name }}</h3>
<p>{{ product.price | currency: 'USD' }}</p>

<!-- add button container -->
<div class="d-flex flex-column align-items-center">
  <!-- add view details button -->
  <a class="btn btn-primary" [routerLink]="['/products', product.id]"> View Details </a>
  <!-- add to cart button -->
  <a class="btn btn-success" (click)="add.emit(product)"> Add to Cart </a>
</div>
