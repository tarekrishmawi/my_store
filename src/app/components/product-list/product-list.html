<div class="container mt-4">
  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-0">Products</h2>
      <small class="text-muted"> Total: {{ (products$ | async)?.length }} </small>
    </div>

    <!-- Create Product (only logged in users) -->
    <a *ngIf="isLoggedIn" class="btn btn-primary" [routerLink]="['/pages/products/create']">
      + Create Product
    </a>
  </div>

  <!-- EMPTY STATE -->
  <div *ngIf="(products$ | async)?.length === 0" class="text-center text-muted mt-5">
    No products available.
  </div>

  <!-- PRODUCT GRID -->
  <div class="row">
    <div class="col-sm-6 col-md-4 col-lg-3 mb-4" *ngFor="let product of products$ | async">
      <app-product-item [isLoggedIn]="isLoggedIn" [product]="product" (add)="addToCart($event)">
      </app-product-item>
    </div>
  </div>
</div>
