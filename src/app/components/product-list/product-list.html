<h1>Products Page</h1>
<p>Total: {{ (products$ | async)?.length }}</p>
<div class="container mt-4">
  <div class="row">
    <div class="col-md-4 col-lg-3 mb-4" *ngFor="let product of products$ | async">
      <div class="card h-100 shadow-sm text-center">
        <app-product-item [product]="product"> </app-product-item>
      </div>
    </div>
  </div>
</div>
