<div class="container mt-4">
  <h2 class="mb-4 text-center">
    Shopping Cart
    <span class="badge bg-primary ms-2">
      {{ items.length }}
    </span>
  </h2>

  <!-- Empty state -->
  <div *ngIf="items.length === 0" class="alert alert-info text-center">Your cart is empty</div>

  <!-- Cart items -->
  <ng-container *ngIf="items.length > 0">
    <div class="card shadow-sm mb-3" *ngFor="let item of items; let i = index">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5 class="card-title mb-1">
            {{ item.name }}
          </h5>

          <p class="card-text text-muted mb-0">Price: {{ item.price }} $</p>
        </div>

        <button class="btn btn-outline-danger btn-sm" (click)="remove(i)">Remove</button>
      </div>
    </div>
  </ng-container>

  <!-- Total -->
  <div *ngIf="items.length > 0" class="card shadow-sm p-3">
    <div class="d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Total: {{ total }} $</h4>

      <button class="btn btn-danger" (click)="clearCart()">Clear Cart</button>
      <a class="btn btn-primary" routerLink="/checkout">Proceed to Checkout</a>
    </div>
  </div>
</div>
