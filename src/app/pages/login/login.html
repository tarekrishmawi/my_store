<div class="container mt-5" style="max-width: 400px">
  <h3>Login</h3>

  <form (ngSubmit)="login()" #loginForm="ngForm">
    <div class="mb-3">
      <label>Username</label>
      <input type="text" class="form-control" name="username" [(ngModel)]="username" required />
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" class="form-control" name="password" [(ngModel)]="password" required />
    </div>

    <button class="btn btn-primary w-100" type="submit" [disabled]="loginForm.invalid">
      Login
    </button>

    <div *ngIf="errorMessage" class="text-danger mt-2">
      {{ errorMessage }}
    </div>
  </form>
</div>
