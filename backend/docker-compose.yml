services:
  db:
    image: postgres:16-alpine 
    container_name: db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck: # Ensures Postgres is ready , connect to default postgres database to check if it's ready
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: storefront_backend_api
    depends_on:
      db:
        condition: service_healthy 
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
  
    command: >
      sh -c "npm run setup && npm run dev" 

volumes:
  db_data: