<div class="container mt-4">
  @if (product()) {
    <div class="card shadow-sm border-0">
      <div class="row g-0">
        <!-- PRODUCT IMAGE -->
        <div class="col-md-5 text-center p-4">
          <img
            [src]="product()?.imageUrl"
            alt="{{ product()?.name }}"
            class="img-fluid rounded"
            style="max-height: 350px; object-fit: cover"
          />
        </div>

        <!-- PRODUCT DETAILS -->
        <div class="col-md-7">
          <div class="card-body d-flex flex-column h-100">
            <!-- TITLE -->
            <h2 class="fw-bold mb-3">
              {{ product()?.name }}
            </h2>

            <!-- DESCRIPTION -->
            <p class="text-muted flex-grow-1">
              {{ product()?.description }}
            </p>

            <!-- PRICE -->
            <h3 class="text-primary fw-bold mb-4">
              {{ product()?.price | currency: 'USD' }}
            </h3>

            <!-- Category -->
            <p class="text-muted mb-4"><strong>Category:</strong> {{ product()?.category }}</p>

            <div class="d-flex gap-2">
              <!-- Back -->
              <button class="btn btn-outline-secondary" routerLink="/pages/products">
                ← Back to Products
              </button>

              <!-- Add to Cart -->
              <button class="btn btn-success" (click)="addToCart()">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <!-- NOT FOUND STATE -->
    <div class="text-center mt-5">
      <h4 class="text-muted mb-3">Product not found</h4>

      <a routerLink="/pages/products" class="btn btn-primary"> Back to Products </a>
    </div>
  }
</div>
