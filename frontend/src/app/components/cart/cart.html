<div class="container mt-5">
  <h2 class="mb-4 text-start fw-bold">
    Shopping Cart
    <span class="badge rounded-pill bg-primary fs-6 align-middle ms-2">
      {{ items.length }}
    </span>
  </h2>

  <div *ngIf="items.length === 0" class="alert alert-light border text-center py-5 shadow-sm">
    <p class="text-muted mb-0">Your cart is currently empty.</p>
    <a routerLink="/" class="btn btn-primary mt-3">Back to Products</a>
  </div>

  <ng-container *ngIf="items.length > 0">
    <div
      class="card border-0 shadow-sm mb-3 overflow-hidden"
      *ngFor="let item of items; let i = index"
    >
      <div class="card-body p-4">
        <div class="row align-items-center">
          <div class="col-md-5 d-flex align-items-center">
            <img
              [src]="item.imageUrl"
              [alt]="item.name"
              class="rounded me-3"
              style="width: 80px; height: 80px; object-fit: cover"
            />
            <div>
              <h5 class="fw-bold mb-1">{{ item.name }}</h5>
              <p class="text-muted small mb-0">{{ item.price | currency: 'USD' }} per unit</p>
            </div>
          </div>

          <div class="col-md-3">
            <div class="input-group input-group-sm mx-auto" style="max-width: 120px">
              <span class="input-group-text bg-white">Qty</span>
              <input
                type="number"
                class="form-control text-center"
                [value]="item.quantity"
                min="1"
                (change)="onQuantityChange(item.id, $event)"
              />
            </div>
          </div>

          <div class="col-md-4 d-flex justify-content-between align-items-center">
            <div class="text-end w-100 me-4">
              <span class="text-muted small d-block">Subtotal</span>
              <span class="fw-bold fs-5">{{ item.price * item.quantity | currency: 'USD' }}</span>
            </div>
            <button class="btn btn-light text-danger border-0" (click)="remove(i)">
              <i class="bi bi-trash"></i> Remove
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <div *ngIf="items.length > 0" class="card border-0 shadow-sm p-4 mt-4 bg-dark text-white">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h6 class="text-uppercase mb-1 opacity-75">Order Total</h6>
        <h3 class="mb-0 fw-bold">{{ total | currency: 'USD' }}</h3>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-outline-light border-0" (click)="clearCart()">Clear Cart</button>
        <a class="btn btn-primary px-4 fw-bold" routerLink="/checkout">Proceed to Checkout</a>
      </div>
    </div>
  </div>
</div>
